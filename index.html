<!doctype html>

<head>
  <meta charset="utf-8">

  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

<body>

<!-- Add your site or application content here -->
<h1>ClickyGame!</h1>
<p>Please enter your Name and start to click!.</p>

<p id="scoreDisplay">0</p>
<p id="timerDisplay">60</p>
<button id="button1">Click Me</button>

<label id="label1" for="name">Name (4 to 8 characters):</label>

<input
  type="text"
  id="name"
  name="name"
  required
  minlength="4"
  minlength="3"
  maxlength="8"
  size="10"
size="16" />
<button id="button2">Submit High Score</button>
<h2>High Scores</h2>
<table id="scoreTable" border="1">
  <thead>
  <tr>
    <th>Name</th>
    <th>Score</th>
  </tr>
  </thead>
  <tbody>
  </tbody>
</table>
<script src="js/app.js"></script>

</body>

</html>
